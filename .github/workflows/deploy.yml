name: CI / Build Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_MODE: local
          NEXT_PUBLIC_DB_PROVIDER: local

  # Vercel deploys automatically via GitHub integration on push to main.
  # To add manual Vercel CLI deployment, add VERCEL_TOKEN, VERCEL_ORG_ID,
  # and VERCEL_PROJECT_ID as repository secrets.
